<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AI Handwriting Generator</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
header{text-align:center;margin-bottom:2rem}
header h1{font-size:2rem;font-weight:700;background:linear-gradient(135deg,#60a5fa,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:#94a3b8;margin-top:.4rem;font-size:.95rem}
.card{background:#1e293b;border:1px solid #334155;border-radius:1rem;padding:1.8rem;
  width:100%;max-width:720px}
.field{margin-bottom:1.2rem}
label{display:block;font-size:.82rem;color:#94a3b8;margin-bottom:.4rem;font-weight:500}
input[type=text]{width:100%;padding:.7rem 1rem;border-radius:.5rem;
  border:1px solid #475569;background:#0f172a;color:#e2e8f0;font-size:1rem;outline:none;
  transition:border-color .2s}
input[type=text]:focus{border-color:#60a5fa}
.slider-row{display:flex;align-items:center;gap:.75rem}
input[type=range]{flex:1;accent-color:#60a5fa}
.slider-val{font-size:.85rem;color:#60a5fa;min-width:2.5rem;text-align:right}
.btn-row{display:flex;gap:.75rem;margin-top:1.4rem}
button{flex:1;padding:.75rem;border-radius:.5rem;border:none;font-size:1rem;
  font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s}
button:active{transform:scale(.97)}
button:disabled{opacity:.4;cursor:not-allowed}
#btnGen{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff}
#btnDl{background:#1e293b;color:#94a3b8;border:1px solid #475569}
#btnDl:hover:not(:disabled){border-color:#60a5fa;color:#e2e8f0}
#status{margin-top:1rem;font-size:.85rem;color:#94a3b8;min-height:1.2em}
#result{display:none;margin-top:1.5rem}
#result h2{font-size:.9rem;color:#94a3b8;margin-bottom:.75rem}
#outImg{width:100%;border-radius:.5rem;border:1px solid #334155;background:#fff;
  image-rendering:crisp-edges}
.badge{display:inline-block;padding:.15rem .55rem;border-radius:999px;font-size:.75rem;font-weight:600}
.green{background:#14532d;color:#4ade80}.red{background:#450a0a;color:#f87171}
footer{margin-top:2.5rem;color:#475569;font-size:.8rem;text-align:center}
</style>
</head>
<body>
<header>
  <h1>AI Handwriting Generator</h1>
  <p>Real handwriting data → CharNet → Bézier curves → your text in handwriting</p>
</header>

<div class="card">
  <div class="field">
    <label for="txt">Text (A–Z, a–z, 0–9 only)</label>
    <input id="txt" type="text" value="Hello" maxlength="25" placeholder="Hello123"/>
  </div>

  <div class="field">
    <label>Pen variation (noise)
      <span style="color:#475569;font-weight:400"> — higher = more natural jitter</span>
    </label>
    <div class="slider-row">
      <input id="noise" type="range" min="0.005" max="0.06" step="0.005" value="0.018"/>
      <span class="slider-val" id="noiseVal">0.018</span>
    </div>
  </div>

  <div class="btn-row">
    <button id="btnGen">Generate</button>
    <button id="btnDl" disabled>Download PDF</button>
  </div>

  <div id="status">Checking model…</div>

  <div id="result">
    <h2>Generated handwriting</h2>
    <img id="outImg" alt="Generated handwriting"/>
  </div>
</div>

<footer>BSAI24082 · Abdullah Shahzad · AI-Powered Handwriting Generation System</footer>

<script>
const $=id=>document.getElementById(id);
let lastText='', lastNoise=0.018;

// Noise slider label
$('noise').addEventListener('input',()=>{
  $('noiseVal').textContent=parseFloat($('noise').value).toFixed(3);
});

async function checkStatus(){
  try{
    const d=await(await fetch('/status')).json();
    if(d.ready){
      $('status').innerHTML='<span class="badge green">Model ready</span>'
        +` epoch&nbsp;${d.epoch} &middot; val&nbsp;MSE&nbsp;${d.loss}`;
    } else {
      $('status').innerHTML='<span class="badge red">No model</span> '
        +'Train on Colab first, then place <code>style_net.pt</code> in <code>checkpoints/</code>.';
      $('btnGen').disabled=true;
    }
  } catch {
    $('status').textContent='Cannot reach server.';
  }
}
checkStatus();

$('btnGen').addEventListener('click', async()=>{
  const text=$('txt').value.trim();
  const noise=parseFloat($('noise').value);
  if(!text){$('status').textContent='Enter some text.';return}

  $('btnGen').disabled=true; $('btnDl').disabled=true;
  $('status').textContent='Generating…';

  const r=await fetch('/generate',{method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({text,noise})});
  const d=await r.json();

  if(d.error){
    $('status').textContent='Error: '+d.error;
  } else {
    $('outImg').src='data:image/png;base64,'+d.image;
    $('result').style.display='block';
    lastText=d.rendered; lastNoise=noise;
    $('status').textContent=`Rendered "${d.rendered}" (noise=${noise})`;
    $('btnDl').disabled=false;
  }
  $('btnGen').disabled=false;
});

$('btnDl').addEventListener('click',async()=>{
  const r=await fetch('/download',{method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({text:lastText,noise:lastNoise})});
  if(!r.ok){const d=await r.json();$('status').textContent='Error: '+d.error;return}
  const url=URL.createObjectURL(await r.blob());
  Object.assign(document.createElement('a'),{href:url,download:'handwriting.pdf'}).click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
